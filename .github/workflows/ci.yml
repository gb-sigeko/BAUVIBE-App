name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.TEST_DATABASE_URL }}
      NEXTAUTH_URL: http://localhost:3005
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      EMAIL_SERVER: smtp://127.0.0.1:1025
      EMAIL_FROM: "CI <ci@bauvibe.local>"
      EMAIL_MOCK: "1"
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate (test database)
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Führt nacheinander lint, build und Playwright (PW_USE_EXISTING_BUILD) aus.
      - name: Lint, build und E2E (test:automated)
        run: npm run test:automated
